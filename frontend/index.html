<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Felix AI - Living Assistant</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="bubble bubble-tr"></div>
        <div class="bubble bubble-bl"></div>

        <header class="top-bar">
            <div class="logo-container">
                <div class="logo">FELIX</div>
                <div class="model-dropdown-wrapper">
                    <select id="model-selector" class="model-badge-dropdown">
                        <option value="auto">Felix 2.0 Hybrid</option>
                        <option value="grok">Grok-1 Primary</option>
                        <option value="gemini">Gemini Ultra</option>
                        <option value="mistral">Mistral Fast</option>
                    </select>
                    <div id="latency-indicator" class="latency-tag">1.2s</div>
                </div>
            </div>
            
            <div class="header-right">
                <label class="tts-toggle-header" title="Toggle Voice Output">
                    <input type="checkbox" id="tts-toggle" checked>
                    <div class="tts-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                        </svg>
                    </div>
                </label>
                <div id="status" class="status-indicator">Ready</div>
            </div>
        </header>

        <!-- Welcome Screen -->
        <div id="welcome-screen" class="welcome-screen">
            <div class="welcome-logo">
                <div class="felix-orb"></div>
                <div class="particles">
                    <div class="particle p1"></div>
                    <div class="particle p2"></div>
                    <div class="particle p3"></div>
                </div>
            </div>
            <h1 class="welcome-title">How can I help you today?</h1>
            <p class="welcome-subtitle">I am Felix, your virtual AI assistant.</p>
            <div class="suggestion-chips">
                <button class="chip" data-query="Tell me a fun fact">💡 Fun Fact</button>
                <button class="chip" data-query="Write a short poem about AI">✍️ Write a Poem</button>
                <button class="chip" data-query="Explain quantum physics like I'm five">⚛️ Explain Science</button>
                <button class="chip" data-query="Give me a 5-minute workout routine">💪 Workout Plan</button>
            </div>
        </div>

        <!-- Chat Container -->
        <main class="chat-container" id="chat-messages"></main>

        <footer class="input-container">
            <div id="pulse-wave" class="pulse-wave"></div>
            <div class="input-wrapper">
                <button id="send-btn" class="icon-btn send-btn" title="Send Message">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
                <textarea id="user-input" placeholder="Ask Felix anything..." rows="1"></textarea>
                <div class="input-actions">
                    <button id="mic-btn" class="icon-btn mic-btn" title="Voice Input">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="23"></line>
                            <line x1="8" y1="23" x2="16" y2="23"></line>
                        </svg>
                    </button>
                </div>
            </div>
            <p class="disclaimer">Felix can make mistakes. Check important info.</p>
        </footer>
    </div>

    <script src="api.js"></script>
    <script src="voice.js"></script>
    <script src="app.js"></script>
</body>
</html>
